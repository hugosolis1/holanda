name: PlanetaryEphemeris
options:
  bundleIdPrefix: com.planetaryephemeris
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"

packages:
  SwissEphemeris:
    url: https://github.com/vsmithers1087/SwissEphemeris.git
    from: 0.0.99

targets:
  PlanetaryEphemeris:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/PlanetaryEphemeris
        excludes:
          - "**/*.xcassets/**"
    resources:
      - path: Sources/PlanetaryEphemeris/Resources/ephe
    dependencies:
      - package: SwissEphemeris
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planetaryephemeris.app
        INFOPLIST_FILE: Sources/PlanetaryEphemeris/Info.plist
    info:
      path: Sources/PlanetaryEphemeris/Info.plist
